<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ song.title }} - Chitara</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen pb-24">

    <nav class="bg-gray-800 p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-purple-400 cursor-pointer" onclick="window.location.href='/'">🎵 Chitara</h1>
        {% if user %}
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='/users/{{ user.user_id }}/notifications/'" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">🔔 History</button>
            <span class="text-gray-300 font-semibold">{{ user.name }}</span>
            <button onclick="logout()" class="text-sm bg-red-600 hover:bg-red-700 px-3 py-1 rounded">Logout</button>
        </div>
        {% endif %}
    </nav>

    <main class="container mx-auto p-6 max-w-2xl">
        <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-3xl font-bold mb-4">{{ song.title }}</h2>
            
            {% if song.cover_image %}
            <div class="mb-4">
                <img src="{{ song.cover_image.url }}" alt="Cover Image" class="w-full max-w-md mx-auto rounded-lg shadow-lg">
            </div>
            {% endif %}
            
            <div class="mb-4">
                <p class="text-gray-400">By {{ song.user.name }}</p>
                <p class="text-sm text-gray-500">Created: {{ song.created_at }}</p>
            </div>
            
            {% if song.audio_url %}
            <div class="mb-4">
                <audio id="song-player" controls class="w-full">
                    <source src="{{ song.audio_url }}" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            {% endif %}
            
            {% if shared_link %}
            <div class="mb-4">
                <label class="block text-gray-300 mb-1">Share Link</label>
                <div class="flex gap-2">
                    <input type="text" id="share-link" value="{{ shared_link }}" readonly class="flex-1 bg-gray-700 p-2 rounded text-white">
                    <button onclick="copyLink()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Copy</button>
                </div>
            </div>
            {% endif %}
            
            {% if user and song.user.id == user.user_id %}
            <div class="flex gap-2 mt-4">
                <button onclick="downloadSong()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded">Download</button>
                <button onclick="deleteSong()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded">Delete</button>
            </div>
            {% endif %}
        </div>
    </main>

    <script>
        function copyLink() {
            const linkInput = document.getElementById('share-link');
            linkInput.select();
            document.execCommand('copy');
            alert('Link copied to clipboard!');
        }
        
        function downloadSong() {
            const audio = document.getElementById('song-player');
            if (audio && audio.src) {
                const a = document.createElement('a');
                a.href = audio.src;
                a.download = '{{ song.title }}.mp3';
                a.click();
            }
        }
        
        function deleteSong() {
            if (confirm('Are you sure you want to delete this song?')) {
                fetch('/users/{{ user.user_id }}/library/{{ song.id }}/', { method: 'DELETE' })
                .then(() => window.location.href = '/');
            }
        }
        
        function logout() {
            window.location.href = '/logout/';
        }
    </script>
</body>
</html>
